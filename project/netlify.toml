[build]
command = "npm run build:client"
functions = "netlify/functions"
publish = "dist/spa"

[build.environment]
# Pin Node to a version that has built-in fetch (used by the notification
# code) and that Netlify Functions support natively.
NODE_VERSION = "20"

# Force npm even if pnpm-lock.yaml is present — the Netlify function
# bundler doesn't understand pnpm's symlinked node_modules layout, which
# is why "Cannot find module 'express'" happens even though express is
# in dependencies. Forcing npm gives a flat node_modules that
# zip-it-and-ship-it can read.
NPM_FLAGS = "--include=optional --legacy-peer-deps"
NETLIFY_USE_PNPM = "false"

[functions]
# Bundle ALL runtime dependencies INTO the function with esbuild (note: no
# external_node_modules). This makes the function self-contained, so it does
# not matter how dependencies are installed on the build host (npm, pnpm, a
# symlinked store, etc.) — there is no runtime node_modules lookup to fail.
# This is the deployment-agnostic fix for the "Cannot find module 'express'"
# cold-start crash. Verified locally: the bundled handler loads with no
# node_modules present.
node_bundler = "esbuild"

[[redirects]]
force = true
from = "/api/*"
status = 200
to = "/.netlify/functions/api/:splat"

[[redirects]]
from = "/*"
to = "/index.html"
status = 200
